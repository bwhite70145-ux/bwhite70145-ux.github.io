<!-- LIGHTBOX MODAL -->
<div id="lightbox" class="lightbox" aria-hidden="true">
  <button id="lightboxClose" class="lightbox-close" type="button" aria-label="Close">×</button>

  <button id="lightboxPrev" class="lightbox-nav prev" type="button" aria-label="Previous image">‹</button>

  <div class="lightbox-content">
    <img id="lightboxImg" alt="">
    <p id="lightboxCaption" class="lightbox-caption"></p>
  </div>

  <button id="lightboxNext" class="lightbox-nav next" type="button" aria-label="Next image">›</button>
</div>

<script>
  // script.js
(() => {
  const galleryImages = Array.from(document.querySelectorAll(".gallery img"));

  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  const caption = document.getElementById("lightboxCaption");

  const btnClose = document.getElementById("lightboxClose");
  const btnPrev = document.getElementById("lightboxPrev");
  const btnNext = document.getElementById("lightboxNext");

  let currentIndex = -1;

  function openLightbox(index) {
    currentIndex = index;

    const img = galleryImages[currentIndex];
    lightboxImg.src = img.src;
    lightboxImg.alt = img.alt || "Image";
    caption.textContent = img.alt || "";

    lightbox.classList.add("open");
    lightbox.setAttribute("aria-hidden", "false");

    // Prevent page scroll when lightbox is open
    document.body.style.overflow = "hidden";
  }

  function closeLightbox() {
    lightbox.classList.remove("open");
    lightbox.setAttribute("aria-hidden", "true");

    // Clear src to stop memory usage on some devices
    lightboxImg.src = "";
    document.body.style.overflow = "";
  }

  function showPrev() {
    if (!galleryImages.length) return;
    const nextIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
    openLightbox(nextIndex);
  }

  function showNext() {
    if (!galleryImages.length) return;
    const nextIndex = (currentIndex + 1) % galleryImages.length;
    openLightbox(nextIndex);
  }

  // Click images -> open
  galleryImages.forEach((img, index) => {
    img.style.cursor = "zoom-in";
    img.addEventListener("click", () => openLightbox(index));
  });

  // Close actions
  btnClose.addEventListener("click", closeLightbox);

  // Click outside image closes
  lightbox.addEventListener("click", (e) => {
    // If user clicks the dark background (not the image/content/buttons)
    if (e.target === lightbox) closeLightbox();
  });

  // Prev/Next buttons
  btnPrev.addEventListener("click", (e) => {
    e.stopPropagation();
    showPrev();
  });

  btnNext.addEventListener("click", (e) => {
    e.stopPropagation();
    showNext();
  });

  // Keyboard controls
  document.addEventListener("keydown", (e) => {
    if (!lightbox.classList.contains("open")) return;

    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowLeft") showPrev();
    if (e.key === "ArrowRight") showNext();
  });
})();
</script>
